<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">
  <title>BoatSpotMedia</title>
  <link rel="stylesheet" href="/static/css/style.css">
<style>
:root{--bsm-header-navy:#071a3a;}
header,.header,.topbar,.navbar,.site-header,.nav,nav{
  background:#071a3a !important;
}
.brand-logo-link{display:flex;align-items:center;text-decoration:none;}
.brand-logo-img{height:42px;max-width:290px;object-fit:contain;display:block;}
@media(max-width:700px){.brand-logo-img{height:32px;max-width:220px;}}
</style>
</head>
<body>
  <div class="auth-wrap">
    <div class="card auth-card">
      <h1>Creator access is invite-only</h1>
      <p>Your creator account must be approved by BoatSpotMedia before you can log in.</p>
      <p>If you already applied, please wait for the approval email with your registration link.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;">
        <a class="btn" href="/apply-creator">Apply as Creator</a>
        <a class="btn secondary" href="/creator/login">Back to Creator Login</a>
        <a class="btn secondary" href="/">Home</a>
      </div>
    </div>
  </div>
<script src="/static/js/mobile.js"></script>
</body>
</html>
