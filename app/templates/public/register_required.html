<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">
  <title>Register Required - BoatSpotMedia</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="card auth-card">
      <h1>Register first</h1>
      <p>This Google account is not registered yet.</p>
      <p>You must create your account before logging in.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;">
        <a class="btn" href="/auth/google-register/{{account_type}}">Register with Google</a>
        <a class="btn secondary" href="/login">Back to Login</a>
        <a class="btn secondary" href="/">Home</a>
      </div>
    </div>
  </div>
<script src="/static/js/mobile.js"></script>

  <footer style="padding:24px;text-align:center;color:#6b7280;font-size:14px;">
    <a href="/terms" style="color:#6b7280;text-decoration:none;font-weight:700;">Terms of Service</a>
  </footer>

</body>
</html>
