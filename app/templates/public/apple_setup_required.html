<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">
  <title>BoatSpotMedia</title>
  <link rel="stylesheet" href="/static/css/style.css">

<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32.png') }}">

<style>
.brand-logo-link{display:flex;align-items:center;text-decoration:none;}
.brand-logo-img{height:36px;max-width:280px;object-fit:contain;}
@media(max-width:700px){.brand-logo-img{height:28px;max-width:210px;}}
</style>
</head>
<body>
  <div class="auth-wrap">
    <div class="card auth-card">
      <h1>Apple Login Setup Required</h1>
      <p>Missing Apple variables:</p>
      <pre>{{ missing }}</pre>
      <p>Apple login needs Apple Developer configuration before it can create or log in users.</p>
      <a class="btn secondary" href="/login">Back to Login</a>
    </div>
  </div>
<script src="/static/js/mobile.js"></script>
</body>
</html>
