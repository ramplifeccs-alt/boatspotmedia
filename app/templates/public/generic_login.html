<!doctype html>
<html>
<head><meta charset="utf-8"><title>{{title}} - BoatSpotMedia</title><link rel="stylesheet" href="/static/css/style.css"></head>
<body>
<header><div><b>BoatSpotMedia</b></div><nav><a href="/">Home</a><a href="/login">Login</a></nav></header>
<div class="container">
  <h1>{{title}}</h1>
  <p>{{subtitle}}</p>
  <form class="card" method="post">
    <label>Email</label><input type="email" name="email">
    <label>Password</label><input type="password" name="password">
    <button class="btn">Login</button>
  </form>
  <div class="card">
    <button class="btn secondary" disabled>Continue with Google — setup required</button>
    <button class="btn secondary" disabled>Continue with Apple — setup required</button>
    <p><small>These buttons will work after Google OAuth and Apple Sign In credentials are configured.</small></p>
  </div>
</div>
</body>
</html>
