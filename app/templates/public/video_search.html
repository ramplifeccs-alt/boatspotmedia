<!doctype html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Find Your Video - <a href="{{ url_for('public.home') }}" style="color:inherit;text-decoration:none;">BoatSpotMedia</a></title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav class="topnav"><a href="/">Home</a><a href="/video-search">Find Your Video</a><a href="/shop">Shop</a><a href="/services">Services</a><a href="/charters">Charters</a></nav>
<div class="content">
  <h1>Find Your Video</h1>
  <form class="card" method="get">
    <label>Location</label>
    <input name="location" value="{{ location }}" placeholder="Boca Raton Inlet">
    <div class="form-row">
      <div><label>Date</label><input type="date" name="date" value="{{ date }}"></div>
      <div><label>Start time</label><input type="time" name="start_time" value="{{ start_time }}"></div>
      <div><label>End time</label><input type="time" name="end_time" value="{{ end_time }}"></div>
    </div>
    <button class="btn">Search</button>
  </form>

  <div class="grid">
    {% for v in videos %}
      <div class="card video-card">
        {% if v.public_thumbnail_url %}
          <img src="{{ v.public_thumbnail_url }}" alt="Video preview" style="width:100%;border-radius:12px;">
        {% else %}
          <div class="placeholder-thumb">Preview</div>
        {% endif %}
        <h3>{{ v.location or 'Boat video' }}</h3>
        <p>{{ v.recorded_at or '' }}</p>
        <a class="btn" href="/checkout/video/{{ v.id }}">Buy Original</a>
        <a class="btn" href="/checkout/video/{{ v.id }}?package=edited">Order Edited</a>
        <a class="btn" href="/checkout/video/{{ v.id }}?package=bundle">Original + Edited</a>
      </div>
    {% else %}
      <div class="card">No videos found.</div>
    {% endfor %}
  </div>
</div>
</body>
</html>
