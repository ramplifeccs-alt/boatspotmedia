<!doctype html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BoatSpotMedia</title>
  <link rel="stylesheet" href="/static/css/style.css">

<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32.png') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">

<style>
.brand-logo-link{display:flex;align-items:center;text-decoration:none;}
.brand-logo-img{height:34px;max-width:260px;object-fit:contain;}
@media(max-width:700px){.brand-logo-img{height:28px;max-width:210px;}}
</style>
</head>
<body>
<nav class="topnav"><a href="/">Home</a><a href="/video-search">Find Your Video</a><a href="/shop">Shop</a><a href="https://services.boatspotmedia.com">Services</a><a href="https://charters.boatspotmedia.com">Charters</a></nav>
<div class="content">
  <h1>Find Your Video</h1>
  <form class="card" method="get">
    <label>Location</label>
    <input name="location" value="{{ location }}" placeholder="Boca Raton Inlet">
    <div class="form-row">
      <div><label>Date</label><input type="date" name="date" value="{{ date }}"></div>
      <div><label>Start time</label><input type="time" name="start_time" value="{{ start_time }}"></div>
      <div><label>End time</label><input type="time" name="end_time" value="{{ end_time }}"></div>
    </div>
    <button class="btn">Search</button>
  </form>

  <div class="grid">
    {% for v in videos %}
      <div class="card video-card">
        {% if v.public_thumbnail_url %}
          <img src="{{ v.public_thumbnail_url }}" alt="Video preview" style="width:100%;border-radius:12px;">
        {% else %}
          <div class="placeholder-thumb">Preview</div>
        {% endif %}
        <h3>{{ v.location or 'Boat video' }}</h3>
        <p>{{ v.recorded_at or '' }}</p>
        <a class="btn" href="/checkout/video/{{ v.id }}">Buy Original</a>
        <a class="btn" href="/checkout/video/{{ v.id }}?package=edited">Order Edited</a>
        <a class="btn" href="/checkout/video/{{ v.id }}?package=bundle">Original + Edited</a>
      </div>
    {% else %}
      <div class="card">No videos found.</div>
    {% endfor %}
  </div>
</div>
</body>
</html>
