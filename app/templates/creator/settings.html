<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Creator Settings</title><link rel="stylesheet" href="/static/css/style.css"></head>
<body><div class="creator-settings-v488"><h1>Creator Settings</h1>
{% with messages = get_flashed_messages() %}{% if messages %}<div class="owner-flash-v474">{% for msg in messages %}<div>{{ msg }}</div>{% endfor %}</div>{% endif %}{% endwith %}
<form method="POST" class="owner-edit-form-v474 owner-card-v475">
<label>Email <input name="email" value="{{ creator.email or '' }}"></label><label>First Name <input name="first_name" value="{{ creator.first_name or '' }}"></label><label>Last Name <input name="last_name" value="{{ creator.last_name or '' }}"></label><label>Display / Public Name <input name="display_name" value="{{ creator.display_name or creator.public_name or '' }}"></label><label>Brand / Location <input name="primary_location" value="{{ creator.primary_location or '' }}"></label><label>Phone <input name="phone" value="{{ creator.phone or '' }}"></label><label>Instagram <input name="instagram" value="{{ creator.instagram or '' }}"></label><div class="full actions"><button type="submit">Save Settings</button><a href="/creator/dashboard">Back to Dashboard</a></div></form></div></body></html>
