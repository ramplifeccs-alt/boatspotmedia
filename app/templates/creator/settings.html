<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Creator Settings</title><link rel="stylesheet" href="/static/css/style.css"></head><body><div class="creator-settings-v486"><h1>Creator Settings</h1>{% with messages = get_flashed_messages() %}{% if messages %}<div class="owner-flash-v474">{% for msg in messages %}<div>{{ msg }}</div>{% endfor %}</div>{% endif %}{% endwith %}<form method="POST" class="owner-edit-form-v474 owner-card-v475"><label>Public Name <input name="public_name" value="{{ creator.public_name or '' }}"></label><label>Company / Brand Name <input name="company_name" value="{{ creator.company_name or '' }}"></label><label>Email <input name="email" value="{{ creator.email or '' }}"></label><label>Username <input name="username" value="{{ creator.username or '' }}"></label><label>Instagram <input name="instagram" value="{{ creator.instagram or '' }}"></label><div class="full actions"><button type="submit">Save Settings</button><a href="/creator/dashboard">Back to Dashboard</a></div></form></div></body></html>
