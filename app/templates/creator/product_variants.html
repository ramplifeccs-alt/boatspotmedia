<!doctype html><html><head><meta charset="utf-8"><title>Product Variants</title><link rel="stylesheet" href="/static/css/style.css"></head><body><div class="sidebar-layout"><div class="sidebar"><h2>{{ creator_name or 'Creator' }}</h2><a href="/creator/products">Products</a><a href="/creator/settings">Settings</a></div><div class="content"><h1>Colors / Variants for {{product.title}}</h1><p>Create one product, then add colors like White, Black, Yellow.</p><form method="post" class="card"><label>Color name</label><input name="color_name" placeholder="White / Black / Yellow"><label>Color hex optional</label><input name="color_hex" placeholder="#ffffff"><label>Price adjustment</label><input name="price_adjustment" placeholder="0.00"><label>Photos for this color (max 5)</label><input type="file" name="photos" multiple accept="image/*"><button class="btn">Add Color</button></form><table><tr><th>Color</th><th>Adjustment</th><th>Action</th></tr>{% for v in variants %}<tr><td>{{v.color_name}}</td><td>${{v.price_adjustment}}</td><td><form method="post" action="/creator/products/variants/{{v.id}}/delete" onsubmit="return confirm('Delete this color variant?');"><button class="btn danger">Delete</button></form></td></tr>{% else %}<tr><td colspan="3">No colors yet.</td></tr>{% endfor %}</table></div></div></body></html>
