<!doctype html><html><head><meta charset="utf-8"><title>Creator Dashboard</title><link rel="stylesheet" href="/static/css/style.css"></head><body><div class="sidebar-layout"><div class="sidebar"><h2>Creator</h2><a href="/creator/dashboard">Dashboard</a><a href="/creator/upload">Uploads</a><a href="/creator/batches">Batches</a><a href="/creator/settings">Settings</a></div><div class="content">
<h1>Batches</h1>
<table><tr><th>ID</th><th>Location</th><th>Total Size</th><th>Date</th></tr>
{% for b in batches %}<tr><td>{{b.id}}</td><td>{{b.location}}</td><td>{{(b.total_size_bytes/(1024**3))|round(2)}} GB</td><td>{{b.created_at}}</td></tr>{% endfor %}
</table>
</div></div></body></html>
