<!doctype html><html><head><meta charset="utf-8"><title>Creator Dashboard</title><link rel="stylesheet" href="/static/css/style.css"></head><body><div class="sidebar-layout"><div class="sidebar"><h2>Creator</h2><a href="/creator/dashboard">Dashboard</a><a href="/creator/upload">Uploads</a><a href="/creator/batches">Batches</a><a href="/creator/settings">Settings</a></div><div class="content">
<h1>Upload Videos</h1>
{% if error %}<div class="error">{{error}}</div>{% endif %}
<form method="post" enctype="multipart/form-data">
<label>Location</label><select name="location">{% for l in locations %}<option>{{l.name}}</option>{% endfor %}</select>
<label>Original Price</label><input name="original_price" value="40">
<label>Edited Price</label><input name="edited_price" value="60">
<label>Bundle Price</label><input name="bundle_price" value="80">
<label>Videos</label><input type="file" name="videos" multiple required>
<div class="notice">Maximum per batch: 128GB. Storage limit depends on your plan.</div>
<button class="btn">Upload Batch</button>
</form>
</div></div></body></html>
