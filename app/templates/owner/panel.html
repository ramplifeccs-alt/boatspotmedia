<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Owner Dashboard - BoatSpotMedia Owner</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="owner-dashboard-v475">
{% set owner_active = 'dashboard' %}
<div class="owner-shell-v475">
  
<aside class="owner-sidebar-v475">
  <a href="/owner/panel" class="owner-logo-v475">
    <img src="/static/img/logo-header.png" alt="BoatSpotMedia">
  </a>
  <nav>
    <a href="/owner/panel" class="{% if owner_active == 'dashboard' %}active{% endif %}">Owner Dashboard</a>
    <a href="/owner/applications" class="{% if owner_active == 'applications' %}active{% endif %}">Creator Applications</a>
    <a href="/owner/creator-plans" class="{% if owner_active == 'plans' %}active{% endif %}">Creator Plans</a>
    <a href="/logout" class="danger">Log out</a>
  </nav>
</aside>

  <main class="owner-main-v475">
    <div class="owner-card-v475"><h1>Owner Dashboard</h1></div><div class="owner-content-v475"><div class="container"><h1>Owner Panel</h1><a class="btn" href="/owner/applications">Open Creator Applications</a></div><script src="/static/js/mobile.js"></script>
<p style="padding:16px;"><a href="/owner/creator-plans">Creator Subscription Plans</a></p></div>
  </main>
</div>
</body>
</html>
