<!doctype html><html><head>
  <meta name="viewport" content="width=device-width, initial-scale=1"><meta charset="utf-8"><title>BoatSpotMedia</title><link rel="stylesheet" href="/static/css/style.css">
<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32.png') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">

<style>
.brand-logo-link{display:flex;align-items:center;text-decoration:none;}
.brand-logo-img{height:42px;max-width:220px;object-fit:contain;}
@media(max-width:700px){.brand-logo-img{height:34px;max-width:170px;}}
</style>
</head><body><div class="sidebar-layout"><div class="sidebar"><h2>Services</h2><a href="/service-account/dashboard">Dashboard</a><a href="/service-account/ads">Ads</a><a href="/service-account/billing">Billing</a><a href="https://services.boatspotmedia.com">Public Services</a></div><div class="content"><h1>Service Ads</h1><form method="post" class="card"><label>Title</label><input name="title"><label>Description</label><textarea name="description"></textarea><label>Website URL</label><input name="website_url"><label>Phone</label><input name="phone"><label>Category</label><input name="category" placeholder="Detailing, Mechanic, Electronics"><label>Location</label><input name="location"><label>Cost per click</label><input name="cost_per_click" value="0.15"><button class="btn">Create Ad</button></form><h2>Your Ads</h2><table><tr><th>Title</th><th>Category</th><th>Clicks</th><th>Status</th><th>Action</th></tr>{% for ad in ads %}<tr><td>{{ad.title}}</td><td>{{ad.category}}</td><td>{{ad.clicks or 0}}</td><td>{{'Active' if ad.active else 'Paused'}}</td><td>{% if ad.active %}<form method="post" action="/service-account/ads/{{ad.id}}/pause"><button class="btn danger">Pause</button></form>{% else %}<form method="post" action="/service-account/ads/{{ad.id}}/activate"><button class="btn">Activate</button></form>{% endif %}</td></tr>{% endfor %}</table></div></div><script src="/static/js/mobile.js"></script>
</body></html>
