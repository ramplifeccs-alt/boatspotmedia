<!doctype html><html><head>
  <meta name="viewport" content="width=device-width, initial-scale=1"><meta charset="utf-8"><title>BoatSpotMedia</title><link rel="stylesheet" href="/static/css/style.css">
<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32.png') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">

<style>
.brand-logo-link{display:flex;align-items:center;text-decoration:none;}
.brand-logo-img{height:42px;max-width:220px;object-fit:contain;}
@media(max-width:700px){.brand-logo-img{height:34px;max-width:170px;}}
</style>
</head><body><header><div><a href="/" class="brand-logo-link" style="display:flex;align-items:center;text-decoration:none;">
  <img src="{{ url_for('static', filename='img/boatspotmedia-logo.png') }}" alt="BoatSpotMedia" class="brand-logo-img" style="height:42px;max-width:220px;object-fit:contain;">
</a></div><nav><a href="/">Home</a><a href="/search">Find Your Video</a><a href="https://services.boatspotmedia.com">Services</a><a href="https://charters.boatspotmedia.com">Charters</a><a href="/apply-creator">Apply as Creator</a></nav></header><div class="container">
<h1>Charter Provider Dashboard</h1>
<form method="post" action="/charters/create">
<input name="title" placeholder="Listing title">
<input name="boat_name" placeholder="Boat name">
<input name="location" placeholder="Location">
<input name="capacity" placeholder="Capacity">
<input name="price_hour" placeholder="Price per hour">
<input name="price_trip" placeholder="Price per trip">
<textarea name="description" placeholder="Description"></textarea>
<button class="btn">Create Charter</button>
</form>
{% for l in listings %}<div class="card">{{l.title}} — {{l.location}} — ${{l.price_trip or l.price_hour}}</div>{% endfor %}
</div><script src="/static/js/mobile.js"></script>
</body></html>
