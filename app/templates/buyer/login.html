<!doctype html>
<html lang="en">
<head>
  <link rel="icon" href="/static/img/favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/img/favicon-192.png">
  <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">

  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Buyer Login - BoatSpotMedia</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" type="image/png" href="/static/img/favicon.png">
</head>
<body class="buyer-auth-body-v504o">
<header class="bsm-simple-header"><a href="/"><img src="/static/img/logo-header.png" alt="BoatSpotMedia" class="bsm-logo-img"></a></header>

<div class="buyer-auth-card-v504o">
  <div class="buyer-auth-tabs-v504o">
    <a class="active" href="/buyer/login">Login</a>
    <a href="/buyer/register">Register</a>
  </div>
  <h1>Buyer Login</h1>
  <p>Access your orders, downloads, and edited video deliveries.</p>
  {% if error %}<div class="buyer-auth-error-v504o">{{ error }}</div>{% endif %}
  <form method="POST" class="buyer-auth-form-v504o">
    <label>Email <input type="email" name="email" required autocomplete="email"></label>
    <label>Password <input type="password" name="password" required autocomplete="current-password"></label>
    <button type="submit">Login</button>
  </form>
  <div class="buyer-auth-links-v504o">
    <a href="/buyer/forgot-password">Forgot password?</a>
  </div>
  <div class="buyer-auth-divider-v504o"><span>or</span></div>
  <a class="buyer-google-btn-v504o" href="/auth/google">Continue with Google</a>
  <p class="buyer-auth-small-v504o">Apple login has been removed for now.</p>
</div>
<script src="/static/js/mobile.js"></script><script src="/static/js/tracking.js"></script>
</body></html>
