<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">
  <title>BoatSpotMedia</title>
  <link rel="stylesheet" href="/static/css/style.css">

<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32.png') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">

<style>
.brand-logo-link{display:flex;align-items:center;text-decoration:none;}
.brand-logo-img{height:42px;max-width:220px;object-fit:contain;}
@media(max-width:700px){.brand-logo-img{height:34px;max-width:170px;}}
</style>
</head>
<body>
<div class="sidebar-layout">
  <div class="sidebar">
    <h2>Buyer</h2>
    <p style="opacity:.8;font-size:14px;">{{email or ''}}</p>
    <a href="/buyer/dashboard">Dashboard</a>
    <a href="/search">Find Videos</a>
    <a href="/buyer/orders">Orders</a>
    <a href="/buyer/downloads">Downloads</a>
    <a href="/shop">Shop</a>
    <a href="https://services.boatspotmedia.com">Services</a>
    <a href="/logout">Log out</a>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</div>
<script src="/static/js/mobile.js"></script>
</body>
</html>
