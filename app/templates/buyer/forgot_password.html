<!doctype html>
<html lang="en">
<head>
  <link rel="icon" href="/static/img/favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/img/favicon-192.png">
  <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">

  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Forgot Password - BoatSpotMedia</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" type="image/png" href="/static/img/favicon.png">
</head>
<body class="buyer-auth-body-v504o">
<header class="bsm-simple-header"><a href="/"><img src="/static/img/logo-header.png" alt="BoatSpotMedia" class="bsm-logo-img"></a></header>

<div class="buyer-auth-card-v504o">
  <h1>Forgot Password</h1>
  {% if sent %}
    <div class="buyer-auth-success-v504o">If that email exists, we sent a password reset link.</div>
    <p><a href="/buyer/login">Back to login</a></p>
  {% else %}
    <p>Enter your email and we will send you a secure reset link.</p>
    <form method="POST" class="buyer-auth-form-v504o">
      <label>Email <input type="email" name="email" required autocomplete="email"></label>
      <button type="submit">Send Reset Link</button>
    </form>
    <div class="buyer-auth-links-v504o"><a href="/buyer/login">Back to login</a></div>
  {% endif %}
</div>
<script src="/static/js/mobile.js"></script>
</body></html>
