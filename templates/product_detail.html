{% extends 'base.html' %}{% block content %}<div class="card"><h1>{{ product.title }}</h1><p class="price">${{ '%.2f'|format(product.price) }}</p><p>{{ product.description }}</p><p><a href="{{ url_for('public_creator', creator_id=creator.id) }}">{{ creator.public_name }}</a></p>{% if current_user and current_user.role=='buyer' %}<form method="post" action="{{ url_for('add_product_cart', product_id=product.id) }}"><button class="btn">{{ t('add_to_cart') }}</button></form>{% endif %}</div>{% endblock %}
