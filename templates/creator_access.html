{% extends 'base.html' %}{% block content %}<section class="hero"><h1>{{ t('creator_access') }}</h1><p>{{ t('support_email_notice') }}</p></section><div class="card"><form method="post" class="grid grid-2"><div class="field"><label>{{ t('first_name') }}</label><input name="first_name" required></div><div class="field"><label>{{ t('last_name') }}</label><input name="last_name" required></div><div class="field"><label>{{ t('brand_name') }}</label><input name="brand_name" required></div><div class="field"><label>{{ t('email') }}</label><input type="email" name="email" required></div><div class="field" style="grid-column:1/-1"><label>{{ t('social_link') }}</label><input name="social_link" required></div><div class="field" style="grid-column:1/-1"><label>{{ t('primary_location') }}</label><input list="locations" name="primary_location" required></div><button class="btn">{{ t('submit') }}</button></form><datalist id="locations">{% for loc in creator_locations %}<option value="{{ loc }}">{% endfor %}</datalist></div>{% endblock %}
