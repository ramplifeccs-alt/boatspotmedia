{% extends 'base.html' %}{% block content %}
<section class="hero"><h1>Service listing application</h1><p>Private form for marine services. Complete your details and we will review your listing.</p></section>
<div class="card" style="max-width:860px">
  <div class="badge">Standard Listing · ${{ listing_price }}/month</div>
  <form method="post" class="grid grid-2" style="margin-top:16px">
    <div class="field"><label>Business name</label><input name="business_name" required></div>
    <div class="field"><label>Email</label><input type="email" name="email" required></div>
    <div class="field"><label>Your name</label><input name="name" required></div>
    <div class="field"><label>Category</label><input name="category" required></div>
    <div class="field"><label>City</label><input name="city" required></div>
    <div class="field"><label>Website</label><input name="website"></div>
    <button class="btn">Submit request</button>
  </form>
</div>
{% endblock %}
