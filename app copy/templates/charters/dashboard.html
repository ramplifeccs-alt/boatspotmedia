<!doctype html><html><head>
  <meta name="viewport" content="width=device-width, initial-scale=1"><meta charset="utf-8"><title>BoatSpotMedia</title><link rel="stylesheet" href="/static/css/style.css">  <link rel="icon" type="image/png" href="/static/img/favicon.png">
  <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">
  <meta name="theme-color" content="#071b34">
</head><body><header><div><a href="/" style="color:inherit;text-decoration:none;"><b>BoatSpotMedia</b></a></div><nav><a href="/">Home</a><a href="/search">Find Your Video</a><a href="https://services.boatspotmedia.com">Services</a><a href="https://charters.boatspotmedia.com">Charters</a><a href="/apply-creator">Apply as Creator</a></nav></header><div class="container">
<h1>Charter Provider Dashboard</h1>
<form method="post" action="/charters/create">
<input name="title" placeholder="Listing title">
<input name="boat_name" placeholder="Boat name">
<input name="location" placeholder="Location">
<input name="capacity" placeholder="Capacity">
<input name="price_hour" placeholder="Price per hour">
<input name="price_trip" placeholder="Price per trip">
<textarea name="description" placeholder="Description"></textarea>
<button class="btn">Create Charter</button>
</form>
{% for l in listings %}<div class="card">{{l.title}} — {{l.location}} — ${{l.price_trip or l.price_hour}}</div>{% endfor %}
</div><script src="/static/js/mobile.js"></script>
</body></html>
