<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password - BoatSpotMedia</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" type="image/png" href="/static/img/favicon.png">
</head>
<body class="buyer-auth-body-v504o">
<header class="bsm-simple-header"><a href="/"><img src="/static/img/logo-header.png" alt="BoatSpotMedia" class="bsm-logo-img"></a></header>

<div class="buyer-auth-card-v504o">
  <h1>Reset Password</h1>
  {% if invalid %}
    <div class="buyer-auth-error-v504o">This reset link is invalid or expired.</div>
    <p><a href="/buyer/forgot-password">Request a new link</a></p>
  {% elif success %}
    <div class="buyer-auth-success-v504o">Your password has been reset.</div>
    <p><a href="/buyer/login">Login now</a></p>
  {% else %}
    {% if error %}<div class="buyer-auth-error-v504o">{{ error }}</div>{% endif %}
    <form method="POST" class="buyer-auth-form-v504o">
      <label>New Password <input type="password" name="password" required autocomplete="new-password"></label>
      <label>Confirm Password <input type="password" name="confirm_password" required autocomplete="new-password"></label>
      <button type="submit">Reset Password</button>
    </form>
  {% endif %}
</div>
<script src="/static/js/mobile.js"></script>
</body></html>
